version: '3.8'

# ============================================================
# OMEGA BEAST V∞.2 — Docker Compose
# Run the installer script first to build the agent images.
# This file is regenerated by the installer; edit with care.
# ============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: omega-redis
    networks:
      - omega-net
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  agentbus:
    build: ./agents/agentbus
    container_name: omega-agentbus
    ports:
      - "8081:8081"
      - "9081:9081"
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9081/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  hustle-bridge:
    build: ./agents/hustle-bridge
    container_name: omega-hustle-bridge
    ports:
      - "3001:3001"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  telegram-bot:
    build: ./agents/telegram-bot
    container_name: omega-telegram
    env_file: ./config/.env
    depends_on:
      - hustle-bridge
    networks:
      - omega-net
    restart: unless-stopped

  oracle-engine:
    build: ./agents/oracle-engine
    container_name: omega-oracle
    ports:
      - "3002:3002"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  patrick:
    build: ./agents/patrick
    container_name: omega-patrick
    ports:
      - "3005:3005"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  dj:
    build: ./agents/dj
    container_name: omega-dj
    ports:
      - "3003:3003"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
      hustle-bridge:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  hashim:
    build: ./agents/hashim
    container_name: omega-hashim
    ports:
      - "3004:3004"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  bossman:
    build: ./agents/bossman
    container_name: omega-bossman
    ports:
      - "3006:3006"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
      hustle-bridge:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  dashboard:
    build: ./agents/dashboard
    container_name: omega-dashboard
    ports:
      - "8082:8082"
    env_file: ./config/.env
    depends_on:
      agentbus:
        condition: service_healthy
      hustle-bridge:
        condition: service_healthy
      patrick:
        condition: service_healthy
      dj:
        condition: service_healthy
      hashim:
        condition: service_healthy
      bossman:
        condition: service_healthy
    networks:
      - omega-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  omega-net:
    driver: bridge

volumes:
  redis-data:
